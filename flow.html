<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veo Studio - Node Flow (Pro)</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        /* 独立工作区专属暗黑极客主题 */
        :root { --bg-dark: #0f0f11; --grid-color: rgba(255,255,255,0.03); --accent: #c084fc; }
        body { margin: 0; overflow: hidden; background-color: var(--bg-dark); color: #fff; font-family: 'Google Sans', sans-serif; user-select: none; }
        
        /* 无限点阵网格背景 */
        .flow-viewport {
            position: absolute; width: 100vw; height: 100vh; overflow: hidden; cursor: grab;
            background-image: radial-gradient(var(--grid-color) 1px, transparent 1px);
            background-size: 20px 20px; background-position: 0 0;
        }
        
        /* 🌟 SVG 核心连线层 (必须要垫在节点下方) */
        #svg-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1;
        }

        /* 节点画布层 */
        #node-board {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; transform-origin: 0 0;
        }

        /* 顶部导航 */
        .flow-header {
            position: absolute; top: 0; left: 0; width: 100%; height: 50px; background: rgba(15,15,17,0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 100; display: flex; align-items: center; padding: 0 20px; box-sizing: border-box;
        }
        /* 🌟 节点与端口核心样式 */
        #flow-canvas { position: absolute; top: 0; left: 0; transform-origin: 0 0; will-change: transform; }
        #svg-layer { position: absolute; top: 0; left: 0; overflow: visible; pointer-events: none; z-index: 1; }
        #node-board { position: absolute; top: 0; left: 0; z-index: 2; }
        
        .veo-node {
            position: absolute; width: 260px; background: rgba(30, 30, 35, 0.95); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; cursor: grab; user-select: none;
        }
        .veo-node:active { cursor: grabbing; box-shadow: 0 8px 32px rgba(192,132,252,0.2); border-color: rgba(192,132,252,0.5); }
        .node-header { padding: 12px 16px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 8px; font-size: 14px; border-radius: 10px 10px 0 0; }
        .node-body { padding: 16px; font-size: 13px; color: #aaa; display: flex; flex-direction: column; gap: 12px; }
        
        /* 🔌 引脚端口 */
        .port-row { display: flex; justify-content: space-between; position: relative; align-items: center; }
        .port { width: 14px; height: 14px; border-radius: 50%; background: #2a2a30; border: 2px solid #555; position: absolute; top: 50%; transform: translateY(-50%); cursor: crosshair; transition: 0.2s; z-index: 10; }
        .port:hover { transform: translateY(-50%) scale(1.3); }
        .port-in { left: -8px; }
        .port-out { right: -8px; }
        
        /* 颜色强类型约束 */
        .port-image { border-color: #c084fc; background: rgba(192,132,252,0.2); }
        .port-video { border-color: #38bdf8; background: rgba(56,189,248,0.2); }
    </style>
</head>
<body>

    <div class="flow-header">
        <div style="font-weight: 600; display: flex; align-items: center; gap: 8px;">
            <span class="material-symbols-outlined" style="color: var(--accent);">account_tree</span>
            Veo Flow <span style="font-size: 12px; color: #666; font-weight: normal;">| 节点架构师模式</span>
        </div>
        <div style="margin-left: auto; display: flex; gap: 12px;">
            <button style="background: var(--accent); border: none; padding: 6px 16px; border-radius: 6px; color: #fff; font-weight: bold; cursor: pointer;">▶ 运行工作流</button>
        </div>
    </div>

    <div class="flow-viewport" id="flow-viewport">
        <div id="flow-canvas">
            <svg id="svg-layer"></svg>
            <div id="node-board"></div>
        </div>
    </div>

    <script src="js/db.js"></script>
    
    <script src="./js/flow/flow-engine.js"></script> 

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // 初始化数据库
                await initDB();
                console.log("🟢 Flow 节点数据库加载完毕");
                
                // 🌟 核心：启动节点引擎 (少了这行就不会出图)
                if (typeof initFlowEngine === 'function') {
                    initFlowEngine();
                    console.log("🚀 节点引擎启动成功");
                } else {
                    console.error("❌ 找不到 initFlowEngine 函数，请检查 js/flow/flow-engine.js 文件是否存在且已保存");
                }
            } catch (err) {
                console.error("❌ 初始化失败:", err);
            }
        });
    </script>
</body>
</html>
