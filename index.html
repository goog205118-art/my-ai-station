<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veo Studio - Infinity Flow</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <link rel="stylesheet" href="css/style.css">
    
    <script>
        let adminPwd = sessionStorage.getItem('veo_admin_pwd');
        if (!adminPwd) {
            adminPwd = prompt('🔒 请输入 Veo Studio 控制台安全访问密码：');
            if (!adminPwd) {
                document.body.innerHTML = '<h2 style="color:#ff453a; text-align:center; margin-top:20vh;">未授权访问</h2>';
                throw new Error('未授权'); 
            }
            sessionStorage.setItem('veo_admin_pwd', adminPwd);
        }
    </script>
</head>
<body>
    <div class="top-bar">
        <div class="logo">
            <span class="material-symbols-outlined">account_tree</span> Veo Studio <span style="font-size:12px; color:var(--text-sub); font-weight:normal;">/ Infinity Flow</span>
        </div>
        <div class="top-actions">
            <button class="top-btn" onclick="toggleDrawer()">
                <span class="material-symbols-outlined" style="font-size: 16px;">grid_view</span> 工具箱
            </button>
            <button class="top-btn" onclick="createStickyNote()">
                <span class="material-symbols-outlined" style="font-size: 16px;">sticky_note_2</span> 新建便签
            </button>
        </div>
    </div>

    <div class="tool-drawer" id="tool-drawer">
        <div class="drawer-title">
            <span class="material-symbols-outlined" style="font-size:18px;">apps</span> 拖拽组件至画布
        </div>
        <div class="draggable-tool" draggable="true" ondragstart="event.dataTransfer.setData('plugin', 'generator')">
            <div style="background: rgba(79, 70, 229, 0.2); color: #818cf8; padding: 6px; border-radius: 6px; display: flex;">
                <span class="material-symbols-outlined">auto_awesome</span>
            </div>
            <div>
                <div style="font-size: 13px; font-weight: 500; color: var(--text-main);">社媒灵感生成器</div>
                <div style="font-size: 11px; color: var(--text-sub);">一键生成爆款剧本四要素</div>
            </div>
        </div>
    </div>

    <div class="canvas-viewport" id="canvas-viewport">
        <div class="canvas-board" id="canvas-board"></div>
    </div>

    <div class="floating-console" id="floating-console">
        <div class="prompt-container">
            <div class="mode-tabs">
                <div class="mode-tab active" onclick="switchMode('ref')" id="tab-ref"><span class="material-symbols-outlined">image</span> 参考图</div>
                <div class="mode-tab" onclick="switchMode('frame')" id="tab-frame"><span class="material-symbols-outlined">movie</span> 首尾帧</div>
            </div>

            <div class="input-wrapper">
                <div class="slot-group active" id="slots-ref">
                    <div class="img-slot" id="slot-ref-box" onclick="toggleRefPopover(event)">
                        <span class="material-symbols-outlined" id="ref-icon-placeholder">add_photo_alternate</span>
                        <span id="ref-text-placeholder">参考图</span>
                        <img id="ref-img">
                        <div class="count-badge" id="ref-count-badge">0</div>
                        <div class="remove-badge" onclick="clearReferences(event)">×</div>
                    </div>
                    <input type="file" id="ref-file" class="hidden-input" accept="image/*" multiple onchange="handleMultiRefs(this)">
                    <div class="ref-popover" id="ref-popover" style="display: none;" onclick="event.stopPropagation()">
                        <div class="ref-list" id="ref-list-container"></div>
                        <div class="ref-add-btn" onclick="document.getElementById('ref-file').click()" id="ref-popover-add"><span class="material-symbols-outlined">add</span></div>
                    </div>
                </div>

                <div class="slot-group" id="slots-frame">
                    <div class="img-slot" id="slot-first-box" onclick="document.getElementById('first-file').click()">
                        <span class="material-symbols-outlined">add</span><span>首帧</span>
                        <img id="first-img"><div class="remove-badge" onclick="clearFrame(event, 'firstFrame')">×</div>
                        <input type="file" id="first-file" class="hidden-input" accept="image/*" onchange="handleSingleFrame(this, 'firstFrame')">
                    </div>
                    <span class="material-symbols-outlined" style="color: #666;">swap_horiz</span>
                    <div class="img-slot" id="slot-last-box" onclick="document.getElementById('last-file').click()">
                        <span class="material-symbols-outlined">add</span><span>尾帧</span>
                        <img id="last-img"><div class="remove-badge" onclick="clearFrame(event, 'lastFrame')">×</div>
                        <input type="file" id="last-file" class="hidden-input" accept="image/*" onchange="handleSingleFrame(this, 'lastFrame')">
                    </div>
                </div>

                <textarea id="prompt-input" class="prompt-input" placeholder="描述视频画面内容和动态过程... (支持将画布上的图片拖入左侧框内)"></textarea>
            </div>
        </div>

        <div class="console-actions-row">
            <div class="pill-group">
                <div class="action-pill">
                    <span class="material-symbols-outlined">model_training</span><span id="model-text">Veo 3.1 Fast</span>
                    <select id="model-select" onchange="updateModel(this)"><option value="veo_3_1_fast">Veo 3.1 Fast</option></select>
                </div>
                <div class="action-pill">
                    <span class="material-symbols-outlined" id="ratio-icon">crop_portrait</span><span id="ratio-text">竖屏 9:16</span>
                    <select id="ratio-select" onchange="updateRatio(this)"><option value="9:16">竖屏 9:16</option><option value="16:9">横屏 16:9</option></select>
                </div>
                <div class="action-pill" id="pill-enhance">
                    <span class="material-symbols-outlined">auto_fix_high</span><span id="enhance-text">AI 扩写提示词</span>
                    <select id="enhance-select" onchange="updateEnhance(this)"><option value="true">AI 扩写提示词</option><option value="false">原词生成</option></select>
                </div>
                <div class="action-pill" id="pill-upsample">
                    <span class="material-symbols-outlined">high_quality</span><span id="upsample-text">标准画质</span>
                    <select id="upsample-select" onchange="updateUpsample(this)"><option value="false">标准画质</option><option value="true">开启超分 (更慢)</option></select>
                </div>
                <div class="action-pill">
                    <span class="material-symbols-outlined" style="color:var(--accent)">layers</span><span id="batch-text" style="color:var(--accent)">单次 (x1)</span>
                    <select id="batch-select" onchange="document.getElementById('batch-text').innerText = this.options[this.selectedIndex].text;"><option value="1">单次 (x1)</option><option value="2">并行 (x2)</option></select>
                </div>
                <div class="action-pill" style="border-color: rgba(50, 215, 75, 0.4);">
                    <span class="material-symbols-outlined" style="color:var(--success)">autorenew</span><span id="retry-text" style="color:var(--success)">不自动重试</span>
                    <select id="retry-select" onchange="updateAutoRetry(this)"><option value="false">不自动重试</option><option value="true">失败自动重试</option></select>
                </div>
            </div>
            <button class="submit-btn" id="generate-btn" onclick="submitBatchTask()"><span class="material-symbols-outlined">arrow_upward</span></button>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
