<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veo & Sora Studio - Pro Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <style>
        :root {
            --bg: #0f0f11; --surface: #1c1c1e; --surface-hover: #2c2c2e; --border: #333336;
            --text-main: #f5f5f5; --text-sub: #8e8e93; --accent: #0a84ff; --success: #32d74b; --danger: #ff453a;
            --radius-lg: 20px; --radius-md: 12px; --radius-sm: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Google Sans', -apple-system, sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; color-scheme: dark; }

        .top-bar { padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; background: linear-gradient(180deg, rgba(15,15,17,1) 0%, rgba(15,15,17,0) 100%); z-index: 10; }
        .logo { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: 600; }

        .gallery-container { flex: 1; padding: 0 32px 180px 32px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; align-content: start; }
        .gallery-container::-webkit-scrollbar { width: 6px; }
        .gallery-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .video-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px; display: flex; flex-direction: column; gap: 12px; transition: transform 0.2s; }
        .video-card:hover { border-color: #4a4a4d; }
        .card-header { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-sub); }
        .card-header .time-model { display: flex; align-items: center; gap: 6px; }
        
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: #2c2c2e; color: var(--text-main); }
        .status-badge.success { background: rgba(50, 215, 75, 0.15); color: var(--success); }
        .status-badge.failed { background: rgba(255, 69, 58, 0.15); color: var(--danger); }
        .status-badge.processing { background: rgba(10, 132, 255, 0.15); color: var(--accent); }

        .card-prompt { display: flex; gap: 8px; align-items: flex-start; }
        .card-prompt img { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; background: #2c2c2e; flex-shrink: 0; }
        .card-prompt p { font-size: 13px; line-height: 1.4; color: var(--text-main); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .card-tags { display: flex; gap: 6px; }
        .card-tag { background: #2c2c2e; padding: 2px 6px; border-radius: 4px; font-size: 11px; color: var(--text-sub); }

        .card-media { width: 100%; aspect-ratio: 9/16; background: #0b0b0c; border-radius: var(--radius-sm); overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.05);}
        .card-media.landscape { aspect-ratio: 16/9; }
        .card-media video { width: 100%; height: 100%; object-fit: contain; }
        
        @keyframes pulseText { 0% {opacity:0.5;} 50% {opacity:1;} 100% {opacity:0.5;} }
        .generating-text { font-size: 13px; font-weight: 500; letter-spacing: 1px; margin-top: 12px; animation: pulseText 1.5s infinite; }

        .card-actions { display: flex; justify-content: flex-end; gap: 8px; padding-top: 4px; border-top: 1px solid var(--border); }
        .card-actions button { background: transparent; border: none; color: var(--text-sub); cursor: pointer; display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 4px; transition: all 0.2s; }
        .card-actions button:hover { background: var(--surface-hover); color: var(--text-main); }
        .card-actions button.reuse-btn:hover { color: var(--accent); background: rgba(10, 132, 255, 0.1); }

        .floating-console { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 860px; background: rgba(28, 28, 30, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: var(--radius-lg); padding: 16px; display: flex; flex-direction: column; gap: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); z-index: 100; }
        .prompt-container { background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px; display: flex; flex-direction: column; gap: 12px; }
        .mode-tabs { display: flex; background: rgba(255, 255, 255, 0.05); border-radius: 100px; padding: 4px; width: fit-content; }
        .mode-tab { padding: 6px 14px; border-radius: 100px; font-size: 13px; color: var(--text-sub); cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
        .mode-tab.active { background: rgba(255, 255, 255, 0.1); color: var(--text-main); }
        .input-wrapper { display: flex; gap: 16px; align-items: flex-start; }
        .slot-group { display: none; gap: 8px; align-items: center; flex-shrink: 0; position: relative; }
        .slot-group.active { display: flex; }
        .img-slot { width: 56px; height: 72px; border: 1px dashed #666; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; background: rgba(255,255,255,0.02); transition: all 0.2s; }
        .img-slot:hover { border-color: var(--text-main); background: rgba(255,255,255,0.05); }
        .img-slot span { font-size: 11px; color: var(--text-sub); margin-top: 4px; }
        .img-slot.has-img { border: none; background: transparent; }
        .img-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; z-index: 1; display: none; border-radius: 8px;}
        .img-slot.has-img img { display: block; border: 1px solid var(--border); }
        .count-badge { position: absolute; bottom: -6px; right: -6px; background: white; color: black; border-radius: 50%; width: 20px; height: 20px; display: none; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; z-index: 10; }
        .remove-badge { position: absolute; top: -6px; right: -6px; background: rgba(0,0,0,0.8); border: 1px solid #444; border-radius: 50%; width: 20px; height: 20px; display: none; align-items: center; justify-content: center; font-size: 12px; z-index: 10; cursor: pointer; color: white; }
        .img-slot.has-img .remove-badge { display: flex; }
        .hidden-input { display: none; }
        .ref-popover { position: absolute; bottom: calc(100% + 12px); left: 0; background: rgba(30, 30, 32, 0.95); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px; display: flex; gap: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); z-index: 200; backdrop-filter: blur(20px); transform-origin: bottom left; }
        .ref-list { display: flex; gap: 8px; }
        .popover-img-item { width: 72px; height: 96px; border-radius: 8px; position: relative; overflow: hidden; border: 1px solid var(--border); }
        .popover-img-item img { width: 100%; height: 100%; object-fit: cover; }
        .popover-rm-btn { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.7); color: white; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; }
        .ref-add-btn { width: 72px; height: 96px; border-radius: 8px; border: 1px dashed var(--text-sub); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-sub); }
        .prompt-input { flex: 1; background: transparent; border: none; color: var(--text-main); font-size: 14px; resize: none; height: 72px; line-height: 1.5; }
        .prompt-input:focus { outline: none; }

        .console-actions-row { display: flex; justify-content: space-between; align-items: center; padding-top: 4px;}
        .pill-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .action-pill { position: relative; background: rgba(255,255,255,0.08); border: 1px solid transparent; padding: 6px 12px; border-radius: 100px; font-size: 12px; color: var(--text-main); display: flex; align-items: center; gap: 4px; cursor: pointer; transition: all 0.2s; }
        .action-pill:hover { background: rgba(255,255,255,0.15); }
        .action-pill select { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        
        .submit-btn { background: var(--text-main); color: var(--bg); border: none; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
        .submit-btn:hover:not(:disabled) { transform: scale(1.05); }
        .submit-btn:disabled { background: var(--border); cursor: not-allowed; }

        .spinner { width: 20px; height: 20px; animation: rotate 2s linear infinite; }
        .spinner circle { stroke: var(--bg); stroke-width: 3; stroke-dasharray: 1, 200; stroke-dashoffset: 0; animation: dash 1.5s ease-in-out infinite; stroke-linecap: round; fill: none; }
        .card-media .spinner circle { stroke: currentColor; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        @keyframes dash {
            0% { stroke-dasharray: 1, 200; stroke-dashoffset: 0; }
            50% { stroke-dasharray: 90, 200; stroke-dashoffset: -35px; }
            100% { stroke-dasharray: 90, 200; stroke-dashoffset: -124px; }
        }
    </style>
</head>

<body>
    <div class="top-bar">
        <div class="logo">
            <span class="material-symbols-outlined">movie_edit</span> Veo & Sora Studio
        </div>
    </div>

    <div class="gallery-container" id="task-dashboard"></div>

    <div class="floating-console">
        <div class="prompt-container">
            <div class="mode-tabs">
                <div class="mode-tab active" onclick="switchMode('ref')" id="tab-ref">
                    <span class="material-symbols-outlined">image</span> 参考图
                </div>
                <div class="mode-tab" onclick="switchMode('frame')" id="tab-frame">
                    <span class="material-symbols-outlined">movie</span> 首尾帧
                </div>
            </div>

            <div class="input-wrapper">
                <div class="slot-group active" id="slots-ref">
                    <div class="img-slot" id="slot-ref-box" onclick="toggleRefPopover(event)">
                        <span class="material-symbols-outlined" id="ref-icon-placeholder">add_photo_alternate</span>
                        <span id="ref-text-placeholder">参考图</span>
                        <img id="ref-img">
                        <div class="count-badge" id="ref-count-badge">3</div>
                    </div>
                    <input type="file" id="ref-file" class="hidden-input" accept="image/*" multiple onchange="handleMultiRefs(this)">
                    <div class="ref-popover" id="ref-popover" style="display: none;" onclick="event.stopPropagation()">
                        <div class="ref-list" id="ref-list-container"></div>
                        <div class="ref-add-btn" onclick="document.getElementById('ref-file').click()" id="ref-popover-add">
                            <span class="material-symbols-outlined">add</span>
                        </div>
                    </div>
                </div>

                <div class="slot-group" id="slots-frame">
                    <div class="img-slot" id="slot-first-box" onclick="document.getElementById('first-file').click()">
                        <span class="material-symbols-outlined">add</span><span>首帧</span>
                        <img id="first-img"><div class="remove-badge" onclick="clearFrame(event, 'firstFrame')">×</div>
                        <input type="file" id="first-file" class="hidden-input" accept="image/*" onchange="handleSingleFrame(this, 'firstFrame')">
                    </div>
                    <span class="material-symbols-outlined" style="color: #666;">swap_horiz</span>
                    <div class="img-slot" id="slot-last-box" onclick="document.getElementById('last-file').click()">
                        <span class="material-symbols-outlined">add</span><span>尾帧</span>
                        <img id="last-img"><div class="remove-badge" onclick="clearFrame(event, 'lastFrame')">×</div>
                        <input type="file" id="last-file" class="hidden-input" accept="image/*" onchange="handleSingleFrame(this, 'lastFrame')">
                    </div>
                </div>

                <textarea id="prompt-input" class="prompt-input" placeholder="描述视频画面内容和动态过程..."></textarea>
            </div>
        </div>

        <div class="console-actions-row">
            <div class="pill-group">
                <div class="action-pill">
                    <span class="material-symbols-outlined">model_training</span>
                    <span id="model-text">Veo 3.1 Fast</span>
                    <select id="model-select" onchange="updateModel(this)">
                        <option value="veo_3_1_fast">Veo 3.1 Fast</option>
                        <option value="sora-2-all">Sora 2 (仅单图)</option>
                    </select>
                </div>

                <div class="action-pill">
                    <span class="material-symbols-outlined" id="ratio-icon">crop_portrait</span>
                    <span id="ratio-text">竖屏 9:16</span>
                    <select id="ratio-select" onchange="updateRatio(this)">
                        <option value="9:16">竖屏 9:16</option>
                        <option value="16:9">横屏 16:9</option>
                    </select>
                </div>

                <div class="action-pill" id="pill-enhance">
                    <span class="material-symbols-outlined">auto_fix_high</span>
                    <span id="enhance-text">AI 扩写提示词</span>
                    <select id="enhance-select" onchange="updateEnhance(this)">
                        <option value="true">AI 扩写提示词</option>
                        <option value="false">原词生成</option>
                    </select>
                </div>
                <div class="action-pill" id="pill-upsample">
                    <span class="material-symbols-outlined">high_quality</span>
                    <span id="upsample-text">标准画质</span>
                    <select id="upsample-select" onchange="updateUpsample(this)">
                        <option value="false">标准画质</option>
                        <option value="true">开启超分 (更慢)</option>
                    </select>
                </div>

                <div class="action-pill" id="pill-size" style="display: none;">
                    <span class="material-symbols-outlined">photo_size_select_large</span>
                    <span id="size-text">Large (默认)</span>
                    <select id="size-select" onchange="updateSize(this)">
                        <option value="large">Large (默认)</option>
                        <option value="small">Small (720p)</option>
                    </select>
                </div>
                <div class="action-pill" id="pill-duration" style="display: none;">
                    <span class="material-symbols-outlined">timer</span>
                    <span id="duration-text">10 秒</span>
                    <select id="duration-select" onchange="updateDuration(this)">
                        <option value="10">10 秒</option>
                        <option value="15">15 秒</option>
                    </select>
                </div>
                <div class="action-pill" id="pill-watermark" style="display: none;">
                    <span class="material-symbols-outlined">branding_watermark</span>
                    <span id="watermark-text">无水印</span>
                    <select id="watermark-select" onchange="updateWatermark(this)">
                        <option value="false">无水印</option>
                        <option value="true">保留水印</option>
                    </select>
                </div>

            </div>

            <button class="submit-btn" id="generate-btn" onclick="submitTask()">
                <span class="material-symbols-outlined" id="btn-icon">arrow_upward</span>
            </button>
        </div>
    </div>

    <script>
        const API_SUBMIT = 'https://api.wallyai.top/webhook/proxy-submit'; 
        const API_POLL = 'https://api.wallyai.top/webhook/proxy-poll';     

        let payloadState = {
            model: 'veo_3_1_fast',
            aspectRatio: '9:16', 
            // Veo 参数
            enhancePrompt: true,
            enableUpsample: false,
            // Sora 参数
            soraSize: 'large',
            soraDuration: 10,
            soraWatermark: false,

            firstFrame: null,
            lastFrame: null,
            references: [],
            currentMode: 'ref' 
        };

        document.addEventListener('DOMContentLoaded', () => {
            renderDashboard();
            resumeActivePolls();
        });

        document.addEventListener('click', (e) => {
            const popover = document.getElementById('ref-popover');
            const slotBox = document.getElementById('slot-ref-box');
            if (popover && popover.style.display === 'flex' && !popover.contains(e.target) && !slotBox.contains(e.target)) {
                popover.style.display = 'none';
            }
        });

        // ==============================
        // 动态 UI 控制逻辑
        // ==============================
        function switchMode(mode) {
            payloadState.currentMode = mode;
            document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.slot-group').forEach(s => s.classList.remove('active'));
            document.getElementById(`tab-${mode}`).classList.add('active');
            document.getElementById(`slots-${mode}`).classList.add('active');
        }

        // 🌟 核心升级：模型切换时动态调整输入限制
        function updateModel(select) {
            payloadState.model = select.value;
            document.getElementById('model-text').innerText = select.options[select.selectedIndex].text;

            const isSora = payloadState.model === 'sora-2-all';
            
            // 1. 下方面板参数控制
            document.getElementById('pill-enhance').style.display = isSora ? 'none' : 'flex';
            document.getElementById('pill-upsample').style.display = isSora ? 'none' : 'flex';
            document.getElementById('pill-size').style.display = isSora ? 'flex' : 'none';
            document.getElementById('pill-duration').style.display = isSora ? 'flex' : 'none';
            document.getElementById('pill-watermark').style.display = isSora ? 'flex' : 'none';

            // 2. 🌟 输入框与模式控制 (Sora专属限制)
            const tabFrame = document.getElementById('tab-frame');
            if (isSora) {
                // 隐藏首尾帧选项卡
                tabFrame.style.display = 'none'; 
                // 如果用户当前在首尾帧，强行踢回垫图模式
                if (payloadState.currentMode === 'frame') {
                    switchMode('ref'); 
                }
                // 如果用户传了多张图，直接截断只保留第一张
                if (payloadState.references.length > 1) {
                    payloadState.references = [payloadState.references[0]];
                    renderReferences();
                    // 轻提示，不打断操作
                    console.log('Sora 仅支持单图，已自动截取第一张。'); 
                }
            } else {
                // 切回 Veo 时，恢复首尾帧选项卡
                tabFrame.style.display = 'flex'; 
            }
            // 重新渲染垫图区UI（为了隐藏/显示加号按钮）
            renderReferences();
        }

        function updateRatio(select) {
            payloadState.aspectRatio = select.value;
            document.getElementById('ratio-text').innerText = select.options[select.selectedIndex].text;
            document.getElementById('ratio-icon').innerText = select.value === '16:9' ? 'crop_16_9' : 'crop_portrait';
        }
        function updateEnhance(select) {
            payloadState.enhancePrompt = select.value === 'true';
            document.getElementById('enhance-text').innerText = select.options[select.selectedIndex].text;
        }
        function updateUpsample(select) {
            payloadState.enableUpsample = select.value === 'true';
            document.getElementById('upsample-text').innerText = select.options[select.selectedIndex].text;
        }
        function updateSize(select) {
            payloadState.soraSize = select.value;
            document.getElementById('size-text').innerText = select.options[select.selectedIndex].text;
        }
        function updateDuration(select) {
            payloadState.soraDuration = parseInt(select.value, 10);
            document.getElementById('duration-text').innerText = select.options[select.selectedIndex].text;
        }
        function updateWatermark(select) {
            payloadState.soraWatermark = select.value === 'true';
            document.getElementById('watermark-text').innerText = select.options[select.selectedIndex].text;
        }

        // ==============================
        // 图像处理
        // ==============================
        async function compressImage(file, maxWidth = 1024) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ratio = Math.min(maxWidth / img.width, 1);
                        canvas.width = img.width * ratio;
                        canvas.height = img.height * ratio;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.85));
                    };
                };
            });
        }

        function toggleRefPopover(e) {
            e.stopPropagation();
            if (payloadState.references.length === 0) document.getElementById('ref-file').click();
            else {
                const p = document.getElementById('ref-popover');
                p.style.display = p.style.display === 'flex' ? 'none' : 'flex';
            }
        }

        async function handleMultiRefs(input) {
            if (!input.files || input.files.length === 0) return;
            const files = Array.from(input.files);
            
            // 🌟 动态限制上传数量：Sora 1 张，Veo 3 张
            const maxAllowed = payloadState.model === 'sora-2-all' ? 1 : 3;
            if (payloadState.references.length + files.length > maxAllowed) {
                input.value = '';
                return alert(`当前模型最多仅支持 ${maxAllowed} 张垫图。`);
            }

            for (let file of files) payloadState.references.push(await compressImage(file));
            input.value = ''; renderReferences();
            if(payloadState.references.length > 0) document.getElementById('ref-popover').style.display = 'flex';
        }

        function removeReference(event, index) {
            event.stopPropagation();
            payloadState.references.splice(index, 1);
            renderReferences();
            if(payloadState.references.length === 0) document.getElementById('ref-popover').style.display = 'none';
        }

        function renderReferences() {
            const box = document.getElementById('slot-ref-box');
            const imgEl = document.getElementById('ref-img');
            const countBadge = document.getElementById('ref-count-badge');
            
            if (payloadState.references.length === 0) {
                box.classList.remove('has-img'); imgEl.src = ''; countBadge.style.display = 'none';
            } else {
                box.classList.add('has-img'); imgEl.src = payloadState.references[0];
                countBadge.style.display = payloadState.references.length > 1 ? 'flex' : 'none';
                countBadge.innerText = payloadState.references.length;
            }
            
            const listContainer = document.getElementById('ref-list-container');
            listContainer.innerHTML = payloadState.references.map((b64, index) => `
                <div class="popover-img-item">
                    <img src="${b64}"><div class="popover-rm-btn" onclick="removeReference(event, ${index})">×</div>
                </div>`).join('');
                
            // 🌟 动态控制加号按钮的显示/隐藏
            const maxAllowed = payloadState.model === 'sora-2-all' ? 1 : 3;
            document.getElementById('ref-popover-add').style.display = payloadState.references.length >= maxAllowed ? 'none' : 'flex';
        }

        async function handleSingleFrame(input, type) {
            if (!input.files[0]) return;
            payloadState[type] = await compressImage(input.files[0]);
            const t = type === 'firstFrame' ? 'first' : 'last';
            document.getElementById(`${t}-img`).src = payloadState[type];
            document.getElementById(`slot-${t}-box`).classList.add('has-img');
            input.value = '';
        }

        function clearFrame(event, type) {
            event.preventDefault(); event.stopPropagation();
            payloadState[type] = null;
            const t = type === 'firstFrame' ? 'first' : 'last';
            document.getElementById(`slot-${t}-box`).classList.remove('has-img');
            document.getElementById(`${t}-img`).src = '';
        }

        // ==============================
        // 调度与轮询
        // ==============================
        function setButtonLoading(isLoading) {
            const btn = document.getElementById('generate-btn');
            if (isLoading) {
                btn.disabled = true;
                btn.innerHTML = `<svg class="spinner" viewBox="0 0 50 50"><circle cx="25" cy="25" r="20"></circle></svg>`;
            } else {
                btn.disabled = false;
                btn.innerHTML = `<span class="material-symbols-outlined">arrow_upward</span>`;
            }
        }

        async function submitTask() {
            const prompt = document.getElementById('prompt-input').value.trim();
            if (!prompt) return alert('请填写提示词');
            setButtonLoading(true);

            let submitRef = [], submitFirst = null, submitLast = null;
            if (payloadState.currentMode === 'ref') submitRef = payloadState.references;
            else { submitFirst = payloadState.firstFrame; submitLast = payloadState.lastFrame; }

            const payload = {
                model: payloadState.model,
                prompt: prompt,
                aspectRatio: payloadState.aspectRatio,
                enhancePrompt: payloadState.enhancePrompt,
                enableUpsample: payloadState.enableUpsample,
                soraSize: payloadState.soraSize,
                soraDuration: payloadState.soraDuration,
                soraWatermark: payloadState.soraWatermark,
                firstFrame: submitFirst,
                lastFrame: submitLast,
                references: submitRef
            };

            try {
                const response = await fetch(API_SUBMIT, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
                const data = await response.json();

                if (data.taskId) {
                    saveTaskLocal(data.taskId, payload, 'processing');
                    startTaskPolling(data.taskId);
                    document.getElementById('prompt-input').value = ''; 
                    document.getElementById('ref-popover').style.display = 'none';
                } else throw new Error("API未返回TaskID");
            } catch (error) {
                alert('提交失败: ' + error.message);
            } finally {
                setButtonLoading(false);
            }
        }

        function startTaskPolling(taskId) {
            let attempts = 0;
            const poll = async () => {
                attempts++;
                try {
                    const response = await fetch(API_POLL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ taskId: taskId })
                    });
                    
                    const data = await response.json();
                    if (data.status === 'success' && data.videoUrl) return updateTaskLocal(taskId, 'success', data.videoUrl);
                    if (data.status === 'failed') return updateTaskLocal(taskId, 'failed', null);
                    
                    if (attempts < 240) setTimeout(poll, 15000); 
                    else updateTaskLocal(taskId, 'failed', null);
                } catch (error) { 
                    setTimeout(poll, 15000); 
                }
            };
            poll();
        }

        // ==============================
        // 数据缓存与提取同款
        // ==============================
        function getTasks() { return JSON.parse(localStorage.getItem('veo_gallery_tasks') || '[]'); }

        function saveTaskLocal(taskId, payload, status) {
            const tasks = getTasks();
            let modelLabel = payload.model === 'sora-2-all' ? 'Sora 2' : (payload.references.length > 0 ? 'Veo 3 Components' : 'Veo 3 Fast');
            
            tasks.unshift({
                id: taskId,
                prompt: payload.prompt,
                modelStr: modelLabel,
                modelVal: payload.model,
                ratio: payload.aspectRatio,
                soraSize: payload.soraSize,
                soraDuration: payload.soraDuration,
                soraWatermark: payload.soraWatermark,
                thumb: payload.firstFrame || (payload.references && payload.references[0]) || '', 
                rawImages: { firstFrame: payload.firstFrame, lastFrame: payload.lastFrame, references: payload.references || [] },
                mode: payload.references && payload.references.length > 0 ? 'ref' : 'frame',
                status: status,
                time: new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'}),
                videoUrl: null
            });
            localStorage.setItem('veo_gallery_tasks', JSON.stringify(tasks.slice(0, 50)));
            renderDashboard();
        }

        function updateTaskLocal(taskId, status, url) {
            const tasks = getTasks();
            const task = tasks.find(t => t.id === taskId);
            if (task) {
                task.status = status;
                task.videoUrl = url;
                localStorage.setItem('veo_gallery_tasks', JSON.stringify(tasks));
                renderDashboard();
            }
        }

        function reuseTask(index) {
            const task = getTasks()[index];
            if(!task) return;
            
            document.getElementById('prompt-input').value = task.prompt || '';
            
            if (task.modelVal) {
                const modelSelect = document.getElementById('model-select');
                if(modelSelect.querySelector(`option[value="${task.modelVal}"]`)) {
                    modelSelect.value = task.modelVal;
                    updateModel(modelSelect); // 触发面板动态变化和清洗逻辑
                }
            }

            if (task.ratio) {
                document.getElementById('ratio-select').value = task.ratio;
                updateRatio(document.getElementById('ratio-select'));
            }

            if (task.modelVal === 'sora-2-all') {
                if (task.soraSize) { document.getElementById('size-select').value = task.soraSize; updateSize(document.getElementById('size-select')); }
                if (task.soraDuration) { document.getElementById('duration-select').value = task.soraDuration; updateDuration(document.getElementById('duration-select')); }
                if (task.soraWatermark !== undefined) { document.getElementById('watermark-select').value = task.soraWatermark; updateWatermark(document.getElementById('watermark-select')); }
            }

            if (task.rawImages) {
                payloadState.firstFrame = task.rawImages.firstFrame || null;
                payloadState.lastFrame = task.rawImages.lastFrame || null;
                payloadState.references = task.rawImages.references || [];
                
                // 🌟 提取同款时的二次安全过滤
                if (payloadState.model === 'sora-2-all') {
                    payloadState.firstFrame = null;
                    payloadState.lastFrame = null;
                    if (payloadState.references.length > 1) {
                        payloadState.references = [payloadState.references[0]];
                    }
                }

                switchMode(task.mode || 'ref');
                
                if (payloadState.currentMode === 'frame' && payloadState.model !== 'sora-2-all') {
                    if (payloadState.firstFrame) {
                        document.getElementById('first-img').src = payloadState.firstFrame;
                        document.getElementById('slot-first-box').classList.add('has-img');
                    } else clearFrame(new Event(''), 'firstFrame');
                    
                    if (payloadState.lastFrame) {
                        document.getElementById('last-img').src = payloadState.lastFrame;
                        document.getElementById('slot-last-box').classList.add('has-img');
                    } else clearFrame(new Event(''), 'lastFrame');
                } else {
                    renderReferences();
                }
            }
            document.getElementById('prompt-input').focus();
        }

        function renderDashboard() {
            const tasks = getTasks();
            const container = document.getElementById('task-dashboard');
            if (tasks.length === 0) return container.innerHTML = '<div style="grid-column: 1/-1; text-align:center; color:var(--text-sub); margin-top: 100px;">暂无生成任务，在底部输入提示词开始创作。</div>';

            container.innerHTML = tasks.map((task, index) => {
                let statusBadge = '';
                let mediaHtml = '';
                let ratioClass = task.ratio === '16:9' ? 'landscape' : '';

                if (task.status === 'processing') {
                    statusBadge = `<span class="status-badge processing">排队生成中...</span>`;
                    mediaHtml = `
                    <div class="card-media ${ratioClass}">
                        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; color: var(--accent);">
                            <svg class="spinner" viewBox="0 0 50 50" style="width:36px;height:36px;">
                                <circle cx="25" cy="25" r="20" stroke-width="4" fill="none" stroke-linecap="round"></circle>
                            </svg>
                            <div class="generating-text">视频生成中...</div>
                        </div>
                    </div>`;
                } else if (task.status === 'failed') {
                    statusBadge = `<span class="status-badge failed">失败</span>`;
                    mediaHtml = `<div class="card-media ${ratioClass}" style="background:#2c2c2e; color:var(--danger); font-size:12px;">生成超时或失败</div>`;
                } else {
                    statusBadge = `<span class="status-badge success">已完成</span>`;
                    mediaHtml = `<div class="card-media ${ratioClass}">
                                    <video src="${task.videoUrl}" controls controlslist="nodownload"></video>
                                 </div>`;
                }

                const thumbHtml = task.thumb ? `<img src="${task.thumb}">` : `<div style="width:40px;height:40px;border-radius:4px;background:#2c2c2e;display:flex;align-items:center;justify-content:center;"><span class="material-symbols-outlined" style="font-size:18px;color:#666;">image</span></div>`;

                return `
                <div class="video-card">
                    <div class="card-header">
                        <div class="time-model">
                            <span class="material-symbols-outlined" style="font-size: 14px;">schedule</span> ${task.time} · ${task.modelStr}
                        </div>
                        ${statusBadge}
                    </div>
                    <div class="card-prompt">
                        ${thumbHtml}
                        <p title="${task.prompt}">${task.prompt}</p>
                    </div>
                    <div class="card-tags">
                        <span class="card-tag">${task.ratio}</span>
                        ${task.modelVal === 'sora-2-all' && task.soraDuration ? `<span class="card-tag">${task.soraDuration}s</span>` : ''}
                    </div>
                    ${mediaHtml}
                    <div class="card-actions">
                        ${task.status === 'success' ? `<button onclick="downloadVideo('${task.videoUrl}')" title="下载视频"><span class="material-symbols-outlined">download</span></button>` : ''}
                        <button class="reuse-btn" onclick="reuseTask(${index})" title="提取同款图文参数"><span class="material-symbols-outlined">edit_note</span></button>
                        <button onclick="deleteTask(${index})" title="删除记录"><span class="material-symbols-outlined">delete</span></button>
                    </div>
                </div>
                `;
            }).join('');
        }

        function resumeActivePolls() {
            const tasks = getTasks();
            tasks.forEach(task => { if (task.status === 'processing') startTaskPolling(task.id); });
        }
        function deleteTask(index) {
            if(confirm('确定删除这条生成记录吗？')) {
                const tasks = getTasks();
                tasks.splice(index, 1);
                localStorage.setItem('veo_gallery_tasks', JSON.stringify(tasks));
                renderDashboard();
            }
        }
        function downloadVideo(url) {
            const a = document.createElement('a'); a.href = url; a.target = "_blank";
            a.download = `Studio_Video_${Date.now()}.mp4`; document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }
    </script>
</body>
</html>
