<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veo Studio - Infinity Flow</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <style>
        :root {
            --bg: #0f0f11; --surface: #1c1c1e; --surface-hover: #2c2c2e; --border: #333336;
            --text-main: #f5f5f5; --text-sub: #8e8e93; --accent: #0a84ff; --success: #32d74b; --danger: #ff453a;
            --radius-lg: 20px; --radius-md: 12px; --radius-sm: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Google Sans', -apple-system, sans-serif; user-select: none; }
        
        body { 
            background-color: var(--bg); color: var(--text-main); height: 100vh; overflow: hidden; color-scheme: dark;
            background-image: radial-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 1px);
            background-size: 30px 30px; background-position: 0 0;
        }

        .top-bar { position: fixed; top: 0; left: 0; width: 100%; padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(180deg, rgba(15,15,17,0.8) 0%, rgba(15,15,17,0) 100%); z-index: 1000; pointer-events: none; }
        .logo { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: 600; text-shadow: 0 2px 10px rgba(0,0,0,0.5); pointer-events: auto; }
        .top-actions { display: flex; gap: 12px; pointer-events: auto; }
        .top-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 8px 14px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 6px; backdrop-filter: blur(10px); transition: all 0.2s; font-size: 13px; }
        .top-btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-1px); }

        /* 🧰 左侧工具抽屉 */
        .tool-drawer { position: fixed; left: -320px; top: 0; width: 300px; height: 100vh; background: rgba(28, 28, 30, 0.85); backdrop-filter: blur(25px); border-right: 1px solid var(--border); z-index: 900; transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1); padding: 80px 20px 20px 20px; display: flex; flex-direction: column; gap: 16px; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        .tool-drawer.open { left: 0; }
        .drawer-title { font-size: 14px; font-weight: 600; color: var(--text-sub); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .draggable-tool { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: var(--radius-sm); display: flex; align-items: center; gap: 12px; cursor: grab; transition: all 0.2s; }
        .draggable-tool:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); transform: translateY(-2px); }
        .draggable-tool:active { cursor: grabbing; }

        .canvas-viewport { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; cursor: grab; }
        .canvas-viewport:active { cursor: grabbing; }
        .canvas-board { position: absolute; top: 0; left: 0; width: 1px; height: 1px; transform-origin: 0 0; }

        /* 统一卡片样式 */
        .video-card { position: absolute; width: 340px; background: rgba(28, 28, 30, 0.95); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: default; }
        .card-header { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-sub); cursor: grab; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .card-header:active { cursor: grabbing; }
        .card-header .time-model { display: flex; align-items: center; gap: 6px; pointer-events: none; }
        
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: #2c2c2e; color: var(--text-main); }
        .status-badge.success { background: rgba(50, 215, 75, 0.15); color: var(--success); }
        .status-badge.failed { background: rgba(255, 69, 58, 0.15); color: var(--danger); }
        .status-badge.processing { background: rgba(10, 132, 255, 0.15); color: var(--accent); }

        .card-prompt { display: flex; gap: 8px; align-items: flex-start; }
        .card-prompt img { width: 44px; height: 44px; border-radius: 4px; object-fit: cover; background: #2c2c2e; flex-shrink: 0; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .card-prompt p { font-size: 13px; line-height: 1.4; color: var(--text-main); user-select: text; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        .card-tags { display: flex; gap: 6px; flex-wrap: wrap;}
        .card-tag { background: #2c2c2e; padding: 2px 6px; border-radius: 4px; font-size: 11px; color: var(--text-sub); }

        .card-media { width: 100%; background: #0b0b0c; border-radius: var(--radius-sm); overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.05); min-height: 120px; }
        .card-media img, .card-media video { width: 100%; height: auto; display: block; max-height: 500px; object-fit: contain; }
        
        .sticky-note { resize: both; overflow: hidden; min-width: 200px; min-height: 140px; background: rgba(255, 213, 79, 0.1); border: 1px solid rgba(255, 213, 79, 0.3); padding: 0; }
        .sticky-note .card-header { background: rgba(255, 213, 79, 0.15); padding: 10px 12px; border-bottom: none; border-radius: var(--radius-md) var(--radius-md) 0 0; }
        .sticky-note textarea { width: 100%; height: calc(100% - 42px); background: transparent; border: none; color: #fff; font-size: 14px; line-height: 1.6; resize: none; outline: none; padding: 0 12px 12px 12px; user-select: text; }

        /* 💡 灵感生成器专属样式 */
        .tool-generator { width: 380px; background: rgba(20, 20, 22, 0.95); border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .tool-generator .gen-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 12px; }
        .gen-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
        .gen-item label { font-size: 11px; color: var(--text-sub); display: flex; align-items: center; gap: 4px; }
        .gen-item select { width: 100%; background: transparent; border: none; color: var(--text-main); font-size: 14px; font-weight: 500; outline: none; cursor: pointer; appearance: none; }
        .gen-item select option { background: var(--surface); color: var(--text-main); }
        .gen-actions { display: flex; gap: 8px; padding: 12px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 8px; }
        .gen-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
        .gen-btn.shuffle { background: linear-gradient(135deg, #4f46e5, #9333ea); color: white; }
        .gen-btn.shuffle:hover { filter: brightness(1.1); }
        .gen-btn.copy { background: rgba(255,255,255,0.1); color: var(--text-main); }
        .gen-btn.copy:hover { background: rgba(255,255,255,0.15); }

        .generating-text { font-size: 13px; font-weight: 500; letter-spacing: 1px; margin-top: 12px; animation: pulseText 1.5s infinite; color: var(--accent); }
        @keyframes pulseText { 0% {opacity:0.5;} 50% {opacity:1;} 100% {opacity:0.5;} }

        .card-actions { display: flex; justify-content: flex-end; gap: 8px; padding-top: 4px; border-top: 1px solid var(--border); }
        .card-actions button { background: transparent; border: none; color: var(--text-sub); cursor: pointer; display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 4px; transition: all 0.2s; }
        .card-actions button:hover { background: var(--surface-hover); color: var(--text-main); }
        .card-actions button.reuse-btn:hover { color: var(--accent); background: rgba(10, 132, 255, 0.1); }
        .card-actions button.retry-btn:hover { color: var(--success); background: rgba(50, 215, 75, 0.1); }
        .card-actions button:disabled { opacity: 0.5; cursor: not-allowed; }

        .floating-console { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 900px; background: rgba(28, 28, 30, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: var(--radius-lg); padding: 16px; display: flex; flex-direction: column; gap: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); z-index: 100; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); transform-origin: bottom center; }
        .floating-console.minimized { transform: translateX(-50%) scale(0.6) translateY(20px); opacity: 0.5; cursor: pointer; }
        .floating-console.minimized:hover { opacity: 0.95; transform: translateX(-50%) scale(0.65) translateY(10px); }
        .floating-console.minimized .prompt-container { display: none; }
        .floating-console.minimized * { pointer-events: none; }

        .prompt-container { background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px; display: flex; flex-direction: column; gap: 12px; }
        .mode-tabs { display: flex; background: rgba(255, 255, 255, 0.05); border-radius: 100px; padding: 4px; width: fit-content; }
        .mode-tab { padding: 6px 14px; border-radius: 100px; font-size: 13px; color: var(--text-sub); cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
        .mode-tab.active { background: rgba(255, 255, 255, 0.1); color: var(--text-main); }
        .input-wrapper { display: flex; gap: 16px; align-items: flex-start; }
        .slot-group { display: none; gap: 8px; align-items: center; flex-shrink: 0; position: relative; }
        .slot-group.active { display: flex; }
        .img-slot { width: 56px; height: 72px; border: 1px dashed #666; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; background: rgba(255,255,255,0.02); transition: all 0.2s; overflow: hidden; }
        .img-slot:hover, .img-slot.drag-over { border-color: var(--accent); background: rgba(10, 132, 255, 0.1); }
        .img-slot span { font-size: 11px; color: var(--text-sub); margin-top: 4px; pointer-events: none; }
        .img-slot.has-img { border: none; background: transparent; }
        .img-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; z-index: 1; display: none; border-radius: 8px;}
        .img-slot.has-img img { display: block; border: 1px solid var(--border); }
        .count-badge { position: absolute; bottom: -6px; right: -6px; background: white; color: black; border-radius: 50%; width: 20px; height: 20px; display: none; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; z-index: 10; }
        .remove-badge { position: absolute; top: -6px; right: -6px; background: rgba(0,0,0,0.8); border: 1px solid #444; border-radius: 50%; width: 20px; height: 20px; display: none; align-items: center; justify-content: center; font-size: 12px; z-index: 10; cursor: pointer; color: white; }
        .img-slot.has-img .remove-badge { display: flex; }
        .hidden-input { display: none; }
        
        .ref-popover { position: absolute; bottom: calc(100% + 12px); left: 0; background: rgba(30, 30, 32, 0.95); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px; display: flex; gap: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); z-index: 200; backdrop-filter: blur(20px); transform-origin: bottom left; }
        .ref-list { display: flex; gap: 8px; }
        .popover-img-item { width: 72px; height: 96px; border-radius: 8px; position: relative; overflow: hidden; border: 1px solid var(--border); }
        .popover-img-item img { width: 100%; height: 100%; object-fit: cover; }
        .popover-rm-btn { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.7); color: white; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; }
        .ref-add-btn { width: 72px; height: 96px; border-radius: 8px; border: 1px dashed var(--text-sub); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-sub); }

        .prompt-input { flex: 1; background: transparent; border: none; color: var(--text-main); font-size: 14px; resize: none; height: 72px; line-height: 1.5; outline: none; user-select: text; }

        .console-actions-row { display: flex; justify-content: space-between; align-items: center; padding-top: 4px;}
        .pill-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .action-pill { position: relative; background: rgba(255,255,255,0.08); border: 1px solid transparent; padding: 6px 12px; border-radius: 100px; font-size: 12px; color: var(--text-main); display: flex; align-items: center; gap: 4px; cursor: pointer; transition: all 0.2s; }
        .action-pill:hover { background: rgba(255,255,255,0.15); }
        .action-pill select { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        
        .submit-btn { background: var(--text-main); color: var(--bg); border: none; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
        .submit-btn:hover:not(:disabled) { transform: scale(1.05); }
        .submit-btn:disabled { background: var(--border); cursor: not-allowed; }
        .spinner { width: 20px; height: 20px; animation: rotate 2s linear infinite; }
        .spinner circle { stroke: currentColor; stroke-width: 3; stroke-dasharray: 1, 200; stroke-dashoffset: 0; animation: dash 1.5s ease-in-out infinite; stroke-linecap: round; fill: none; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        @keyframes dash { 0% { stroke-dasharray: 1, 200; stroke-dashoffset: 0; } 50% { stroke-dasharray: 90, 200; stroke-dashoffset: -35px; } 100% { stroke-dasharray: 90, 200; stroke-dashoffset: -124px; } }
    </style>
</head>

<body>
    <div class="top-bar">
        <div class="logo">
            <span class="material-symbols-outlined">account_tree</span> Veo Studio <span style="font-size:12px; color:var(--text-sub); font-weight:normal;">/ Infinity Flow</span>
        </div>
        <div class="top-actions">
            <button class="top-btn" onclick="toggleDrawer()">
                <span class="material-symbols-outlined" style="font-size: 16px;">grid_view</span> 工具箱
            </button>
            <button class="top-btn" onclick="createStickyNote()">
                <span class="material-symbols-outlined" style="font-size: 16px;">sticky_note_2</span> 新建便签
            </button>
        </div>
    </div>

    <div class="tool-drawer" id="tool-drawer">
        <div class="drawer-title">
            <span class="material-symbols-outlined" style="font-size:18px;">apps</span> 拖拽组件至画布
        </div>
        <div class="draggable-tool" draggable="true" ondragstart="event.dataTransfer.setData('plugin', 'generator')">
            <div style="background: rgba(79, 70, 229, 0.2); color: #818cf8; padding: 6px; border-radius: 6px; display: flex;">
                <span class="material-symbols-outlined">auto_awesome</span>
            </div>
            <div>
                <div style="font-size: 13px; font-weight: 500; color: var(--text-main);">社媒灵感生成器</div>
                <div style="font-size: 11px; color: var(--text-sub);">一键生成爆款剧本四要素</div>
            </div>
        </div>
    </div>

    <div class="canvas-viewport" id="canvas-viewport">
        <div class="canvas-board" id="canvas-board"></div>
    </div>

    <div class="floating-console" id="floating-console">
        <div class="prompt-container">
            <div class="mode-tabs">
                <div class="mode-tab active" onclick="switchMode('ref')" id="tab-ref">
                    <span class="material-symbols-outlined">image</span> 参考图
                </div>
                <div class="mode-tab" onclick="switchMode('frame')" id="tab-frame">
                    <span class="material-symbols-outlined">movie</span> 首尾帧
                </div>
            </div>

            <div class="input-wrapper">
                <div class="slot-group active" id="slots-ref">
                    <div class="img-slot" id="slot-ref-box" onclick="toggleRefPopover(event)">
                        <span class="material-symbols-outlined" id="ref-icon-placeholder">add_photo_alternate</span>
                        <span id="ref-text-placeholder">参考图</span>
                        <img id="ref-img">
                        <div class="count-badge" id="ref-count-badge">0</div>
                        <div class="remove-badge" onclick="clearReferences(event)">×</div>
                    </div>
                    <input type="file" id="ref-file" class="hidden-input" accept="image/*" multiple onchange="handleMultiRefs(this)">
                    
                    <div class="ref-popover" id="ref-popover" style="display: none;" onclick="event.stopPropagation()">
                        <div class="ref-list" id="ref-list-container"></div>
                        <div class="ref-add-btn" onclick="document.getElementById('ref-file').click()" id="ref-popover-add">
                            <span class="material-symbols-outlined">add</span>
                        </div>
                    </div>
                </div>

                <div class="slot-group" id="slots-frame">
                    <div class="img-slot" id="slot-first-box" onclick="document.getElementById('first-file').click()">
                        <span class="material-symbols-outlined">add</span><span>首帧</span>
                        <img id="first-img"><div class="remove-badge" onclick="clearFrame(event, 'firstFrame')">×</div>
                        <input type="file" id="first-file" class="hidden-input" accept="image/*" onchange="handleSingleFrame(this, 'firstFrame')">
                    </div>
                    <span class="material-symbols-outlined" style="color: #666;">swap_horiz</span>
                    <div class="img-slot" id="slot-last-box" onclick="document.getElementById('last-file').click()">
                        <span class="material-symbols-outlined">add</span><span>尾帧</span>
                        <img id="last-img"><div class="remove-badge" onclick="clearFrame(event, 'lastFrame')">×</div>
                        <input type="file" id="last-file" class="hidden-input" accept="image/*" onchange="handleSingleFrame(this, 'lastFrame')">
                    </div>
                </div>

                <textarea id="prompt-input" class="prompt-input" placeholder="描述视频画面内容和动态过程... (支持将画布上的图片拖入左侧框内)"></textarea>
            </div>
        </div>

        <div class="console-actions-row">
            <div class="pill-group">
                <div class="action-pill">
                    <span class="material-symbols-outlined">model_training</span>
                    <span id="model-text">Veo 3.1 Fast</span>
                    <select id="model-select" onchange="updateModel(this)">
                        <option value="veo_3_1_fast">Veo 3.1 Fast</option>
                    </select>
                </div>
                <div class="action-pill">
                    <span class="material-symbols-outlined" id="ratio-icon">crop_portrait</span>
                    <span id="ratio-text">竖屏 9:16</span>
                    <select id="ratio-select" onchange="updateRatio(this)">
                        <option value="9:16">竖屏 9:16</option>
                        <option value="16:9">横屏 16:9</option>
                    </select>
                </div>
                <div class="action-pill" id="pill-enhance">
                    <span class="material-symbols-outlined">auto_fix_high</span>
                    <span id="enhance-text">AI 扩写提示词</span>
                    <select id="enhance-select" onchange="updateEnhance(this)">
                        <option value="true">AI 扩写提示词</option>
                        <option value="false">原词生成</option>
                    </select>
                </div>
                <div class="action-pill" id="pill-upsample">
                    <span class="material-symbols-outlined">high_quality</span>
                    <span id="upsample-text">标准画质</span>
                    <select id="upsample-select" onchange="updateUpsample(this)">
                        <option value="false">标准画质</option>
                        <option value="true">开启超分 (更慢)</option>
                    </select>
                </div>
                <div class="action-pill">
                    <span class="material-symbols-outlined" style="color:var(--accent)">layers</span>
                    <span id="batch-text" style="color:var(--accent)">单次 (x1)</span>
                    <select id="batch-select" onchange="document.getElementById('batch-text').innerText = this.options[this.selectedIndex].text;">
                        <option value="1">单次 (x1)</option>
                        <option value="2">并行 (x2)</option>
                    </select>
                </div>
                
                <div class="action-pill" style="border-color: rgba(50, 215, 75, 0.4);">
                    <span class="material-symbols-outlined" style="color:var(--success)">autorenew</span>
                    <span id="retry-text" style="color:var(--success)">不自动重试</span>
                    <select id="retry-select" onchange="updateAutoRetry(this)">
                        <option value="false">不自动重试</option>
                        <option value="true">失败自动重试</option>
                    </select>
                </div>
            </div>

            <button class="submit-btn" id="generate-btn" onclick="submitBatchTask()">
                <span class="material-symbols-outlined">arrow_upward</span>
            </button>
        </div>
    </div>

    <script>
        const API_SUBMIT = 'https://api.wallyai.top/webhook/proxy-submit'; 
        const API_POLL = 'https://api.wallyai.top/webhook/proxy-poll';     

        // 🔒 安全控制
        let adminPwd = sessionStorage.getItem('veo_admin_pwd');
        if (!adminPwd) {
            adminPwd = prompt('🔒 请输入 Veo Studio 控制台安全访问密码：');
            if (!adminPwd) {
                document.body.innerHTML = '<h2 style="color:var(--danger); text-align:center; margin-top:20vh;">未授权访问</h2>';
                throw new Error('未授权'); 
            }
            sessionStorage.setItem('veo_admin_pwd', adminPwd);
        }

        let payloadState = { model: 'veo_3_1_fast', aspectRatio: '9:16', enhancePrompt: true, enableUpsample: false, autoRetry: false, firstFrame: null, lastFrame: null, references: [], currentMode: 'ref' };
        
        let activeTasks = [];
        let activeRetries = new Set(); 

        function removeActiveTask(id) {
            const index = activeTasks.indexOf(id);
            if (index > -1) activeTasks.splice(index, 1);
        }

        function toggleDrawer() {
            const drawer = document.getElementById('tool-drawer');
            drawer.classList.toggle('open');
        }

        // 🗄️ IndexedDB 数据库封装
        const DB_NAME = 'VeoInfinityDB';
        let db;

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    let database = e.target.result;
                    if (!database.objectStoreNames.contains('tasks')) {
                        database.createObjectStore('tasks', { keyPath: 'id' });
                    }
                };
                request.onsuccess = (e) => { db = e.target.result; resolve(db); };

            }

            if (isPanning) { transform.x = e.clientX - startPanX; transform.y = e.clientY - startPanY; updateCanvas(); }
        });

        viewport.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomSensitivity = 0.001;
            const delta = e.deltaY * zoomSensitivity;
            let newScale = Math.min(Math.max(0.2, transform.scale - delta), 3); 
            const rect = viewport.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            transform.x = mouseX - (mouseX - transform.x) * (newScale / transform.scale);
            transform.y = mouseY - (mouseY - transform.y) * (newScale / transform.scale);
            transform.scale = newScale;
            updateCanvas();
        }, { passive: false });

        async function compressImage(file, maxWidth = 1024) {
            return new Promise((resolve) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image(); img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas'); const ratio = Math.min(maxWidth / img.width, 1);
                        canvas.width = img.width * ratio; canvas.height = img.height * ratio;
                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.85));
                    };
                };
            });
        }

        async function submitBatchTask() {
            const prompt = document.getElementById('prompt-input').value.trim();
            if (!prompt) return alert('请填写提示词');
            
            const batchCount = parseInt(document.getElementById('batch-select').value);
            const btn = document.getElementById('generate-btn');
            btn.disabled = true; btn.innerHTML = `<svg class="spinner" viewBox="0 0 50 50"><circle cx="25" cy="25" r="20"></circle></svg>`;

            if (payloadState.currentMode === 'ref') submitRef = [...payloadState.references];
            else { submitFirst = payloadState.firstFrame; submitLast = payloadState.lastFrame; }

            const basePayload = {
                model: payloadState.model, prompt: prompt, aspectRatio: payloadState.aspectRatio,
                enhancePrompt: payloadState.enhancePrompt, enableUpsample: payloadState.enableUpsample,
                autoRetry: payloadState.autoRetry, 
                firstFrame: submitFirst, lastFrame: submitLast, references: submitRef
            };

            let promises = [];
            for(let i=0; i<batchCount; i++) { promises.push(executeSubmission(basePayload, i)); }
            
            await Promise.allSettled(promises);
            btn.disabled = false; btn.innerHTML = `<span class="material-symbols-outlined">arrow_upward</span>`;
            document.getElementById('prompt-input').value = '';

                        modelVal: payload.model, ratio: payload.aspectRatio,
                        autoRetry: payload.autoRetry, retryCount: 0,
                        rawImages: { firstFrame: payload.firstFrame, lastFrame: payload.lastFrame, references: payload.references || [] },
                        mode: payload.references && payload.references.length > 0 ? 'ref' : 'frame',
                        status: 'processing', timestamp: Date.now(), time: new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'}),
                        videoUrl: null, x: spawnX, y: spawnY

        async function retryTask(taskId, btnElement) {
            if (activeRetries.has(taskId)) return; 
            activeRetries.add(taskId);

            if (btnElement) {
                btnElement.disabled = true;
                btnElement.innerHTML = `<svg class="spinner" viewBox="0 0 50 50" style="width:18px;height:18px;stroke:var(--text-sub);"><circle cx="25" cy="25" r="20"></circle></svg>`;
            }
            
            const task = await getTaskDB(taskId);
            if(!task) { activeRetries.delete(taskId); return; }

            const payload = {
                model: task.modelVal, prompt: task.prompt, aspectRatio: task.ratio,
                enhancePrompt: true, enableUpsample: false,
                firstFrame: task.rawImages.firstFrame, lastFrame: task.rawImages.lastFrame, references: task.rawImages.references || []
            };

            try {
                const response = await fetch(API_SUBMIT, { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-studio-pwd': adminPwd }, body: JSON.stringify(payload) });
                if (response.status === 401 || response.status === 403) throw new Error("密码错误");
                const data = await response.json();

                if (data.taskId) {
                    await deleteTaskDB(taskId); 
                    removeActiveTask(taskId); 

                    task.id = data.taskId;      
                    task.status = 'processing';
                    task.retryCount = (task.retryCount || 0) + 1;
                    task.timestamp = Date.now();
                    task.time = new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'});
                    
                    await saveTaskDB(task);     
                    activeRetries.delete(taskId); 
                    await renderBoard();        
                } else throw new Error("无返回 ID");
            } catch (error) {
                console.error("重试失败", error);
                task.status = 'failed'; task.autoRetry = false; 
                await saveTaskDB(task); 
                activeRetries.delete(taskId); 
                renderBoard();
            }
        }

        function startTaskPolling(taskId) {
            let attempts = 0;
            const poll = async () => {
                attempts++;
                try {
                    const response = await fetch(API_POLL, { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-studio-pwd': adminPwd }, body: JSON.stringify({ taskId: taskId }) });
                    if (response.status === 401 || response.status === 403) { removeActiveTask(taskId); return; }
                    const data = await response.json();
                    
                    const task = await getTaskDB(taskId);
                    if (!task) { removeActiveTask(taskId); return; }

                    if (data.status === 'success' && data.videoUrl) { 
                        removeActiveTask(taskId); 
                        task.status = 'success'; task.videoUrl = data.videoUrl; await saveTaskDB(task); renderBoard(); return; 
                    }
                    if (data.status === 'failed') { 
                        removeActiveTask(taskId); 
                        if (task.autoRetry) { retryTask(task.id, null); } 
                        else { task.status = 'failed'; await saveTaskDB(task); renderBoard(); }
                        return;
                    }
                    
                    if (attempts < 240) setTimeout(poll, 15000); 
                    else { 
                        removeActiveTask(taskId);
                        if (task.autoRetry) retryTask(task.id, null); 
                        else { task.status = 'failed'; await saveTaskDB(task); renderBoard(); }
                    }
                } catch (error) { setTimeout(poll, 15000); }
            };
            poll();
        }

            const tasks = await getAllTasksDB();
            board.innerHTML = tasks.map((task) => {
                
                // 🌟 新增类型：插件-灵感生成器
                if (task.type === 'tool_generator') {
                    return `
                    <div class="video-card tool-generator" id="card-${task.id}" style="left: ${task.x}px; top: ${task.y}px;">
                        <div class="card-header">
                            <span style="color:#818cf8; display:flex; align-items:center; gap:4px;">
                                <span class="material-symbols-outlined" style="font-size:14px;">auto_awesome</span> 灵感生成器
                            </span>
                            <button onclick="removeTask('${task.id}')" style="background:transparent; border:none; color:var(--text-sub); cursor:pointer;"><span class="material-symbols-outlined" style="font-size:16px;">close</span></button>
                        </div>
                        
                        <div class="gen-grid">
                            <div class="gen-item">
                                <label><span class="material-symbols-outlined" style="font-size:12px;">video_camera_front</span> 带货形式</label>
                                <select onchange="updateGeneratorState('${task.id}', 'format', this.value)">${buildGeneratorOptions(genData.formats, task.state.format)}</select>
                            </div>
                            <div class="gen-item">
                                <label><span class="material-symbols-outlined" style="font-size:12px;">play_circle</span> 开头节奏</label>
                                <select onchange="updateGeneratorState('${task.id}', 'opening', this.value)">${buildGeneratorOptions(genData.openings, task.state.opening)}</select>
                            </div>
                            <div class="gen-item">
                                <label><span class="material-symbols-outlined" style="font-size:12px;">sell</span> 内容属性</label>
                                <select onchange="updateGeneratorState('${task.id}', 'attribute', this.value)">${buildGeneratorOptions(genData.attributes, task.state.attribute)}</select>
                            </div>
                            <div class="gen-item">
                                <label><span class="material-symbols-outlined" style="font-size:12px;">magic_button</span> 通用调性</label>
                                <select onchange="updateGeneratorState('${task.id}', 'general', this.value)">${buildGeneratorOptions(genData.generals, task.state.general)}</select>
                            </div>
                        </div>

                        <div class="gen-actions">
                            <button class="gen-btn shuffle" onclick="shuffleGenerator('${task.id}')">
                                <span class="material-symbols-outlined" style="font-size:16px;">shuffle</span> 随机抽取
                            </button>
                            <button class="gen-btn copy" onclick="applyGeneratorToPrompt('${task.id}', this)">
                                <span class="material-symbols-outlined" style="font-size:16px;">move_down</span> 应用至控制台
                            </button>
                        </div>
                    </div>
                    `;
                }

                if (task.type === 'note') {
                    return `
                    <div class="video-card sticky-note" id="card-${task.id}" style="left: ${task.x}px; top: ${task.y}px; width: ${task.width || 260}px; height: ${task.height || 180}px;" onmouseup="saveNoteSize('${task.id}', this.offsetWidth, this.offsetHeight)">
                        <div class="card-header">
                            <span style="color:#ffca28; display:flex; align-items:center; gap:4px;">
                                <span class="material-symbols-outlined" style="font-size:14px;">sticky_note_2</span> 即时便签
                            </span>
                            <button onclick="removeTask('${task.id}')" style="background:transparent; border:none; color:#ffca28; cursor:pointer; opacity:0.6;"><span class="material-symbols-outlined" style="font-size:16px;">close</span></button>
                        </div>
                        <textarea oninput="updateNoteText('${task.id}', this.value)" placeholder="在此输入灵感、提示词或分组备注...">${task.text || ''}</textarea>
                    </div>
                    `;
                }

                if (task.type === 'local_image') {
                    return `
                    <div class="video-card" id="card-${task.id}" style="left: ${task.x}px; top: ${task.y}px; width: 220px; padding: 8px; background: rgba(30,30,32,0.95); box-shadow: 0 4px 20px rgba(0,0,0,0.8);">
                        <div class="card-header" style="cursor:grab; padding-bottom:6px; border-bottom:1px solid rgba(255,255,255,0.05);">
                            <span style="font-size:12px; color:var(--text-sub); display:flex; align-items:center; gap:4px;">
                                <span class="material-symbols-outlined" style="font-size:14px;">folder_open</span> 待用素材
                            </span>
                            <button onclick="removeTask('${task.id}')" style="background:transparent; border:none; color:var(--text-sub); cursor:pointer;"><span class="material-symbols-outlined" style="font-size:16px;">close</span></button>
                        </div>
                        <img src="${task.src}" draggable="true" ondragstart="event.dataTransfer.setData('text/plain', '${task.src}')" style="width:100%; border-radius:4px; margin-top:8px; cursor:grab; border:1px solid rgba(255,255,255,0.1);" title="按住图片，拖拽至下方工作台使用">
                    </div>
                    `;
                }

                // 常规类型：视频生成卡片
                let statusBadge = '', mediaHtml = '';

                if (task.status === 'processing') {
                    const retryTxt = task.retryCount ? ` (重试 ${task.retryCount} 次)` : '';
                    statusBadge = `<span class="status-badge processing">生成中...${retryTxt}</span>`;
                    mediaHtml = `<div class="card-media" style="aspect-ratio: ${task.ratio.replace(':','/')};"><div style="display:flex; flex-direction:column; align-items:center; color: var(--accent);"><svg class="spinner" viewBox="0 0 50 50" style="width:36px;height:36px;"><circle cx="25" cy="25" r="20"></circle></svg><div class="generating-text">视频生成中...</div></div></div>`;
                } else if (task.status === 'failed') {
                    statusBadge = `<span class="status-badge failed">失败</span>`;
                    mediaHtml = `<div class="card-media" style="background:#2c2c2e; color:var(--danger); aspect-ratio: ${task.ratio.replace(':','/')}; font-size:12px;">生成超时或失败</div>`;
                } else {
                    statusBadge = `<span class="status-badge success">已完成</span>`;
                    mediaHtml = `<div class="card-media"><video src="${task.videoUrl}" controls loop muted playsinline></video></div>`;
                }

                const thumbImg = task.rawImages.firstFrame || (task.rawImages.references && task.rawImages.references[0]);
                const thumbHtml = thumbImg ? `<img src="${thumbImg}" draggable="true" ondragstart="event.dataTransfer.setData('text/plain', '${thumbImg}')" title="可按住拖拽至下方工作台使用">` : `<div style="width:44px;height:44px;border-radius:4px;background:#2c2c2e;display:flex;align-items:center;justify-content:center;"><span class="material-symbols-outlined" style="color:#666;">image</span></div>`;

                return `
                <div class="video-card" id="card-${task.id}" style="left: ${task.x}px; top: ${task.y}px;">
                    <div class="card-header">
                        <div class="time-model"><span class="material-symbols-outlined" style="font-size: 14px;">schedule</span> ${task.time} · ${task.modelStr}</div>
                        ${statusBadge}
                    </div>
                    <div class="card-prompt">${thumbHtml}<p title="${task.prompt}">${task.prompt}</p></div>
                    <div class="card-tags">
                        <span class="card-tag">${task.ratio}</span>
                        ${task.autoRetry ? `<span class="card-tag" style="color:var(--success); border: 1px solid var(--success);">已开挂机重试</span>` : ''}
                    </div>
                    ${mediaHtml}
                    <div class="card-actions">
                        ${task.status === 'success' ? `<button onclick="downloadVideo('${task.videoUrl}')" title="下载视频"><span class="material-symbols-outlined">download</span></button>` : ''}
                        ${task.status === 'failed' ? `<button class="retry-btn" onclick="retryTask('${task.id}', this)" title="原地重试"><span class="material-symbols-outlined">refresh</span></button>` : ''}
                        <button class="reuse-btn" onclick="reuseTask('${task.id}')" title="完整提取图文参数"><span class="material-symbols-outlined">edit_note</span></button>
                        <button onclick="removeTask('${task.id}')" title="删除记录"><span class="material-symbols-outlined">delete</span></button>
                    </div>
                </div>
                `;
            }).join('');

            tasks.forEach(task => makeCardDraggable(document.getElementById(`card-${task.id}`), task));
            
            tasks.forEach(task => { 
                if (task.status === 'processing' && !activeTasks.includes(task.id)) { 
                    activeTasks.push(task.id); 
                    startTaskPolling(task.id); 
                } 
            });
        }

        async function removeTask(id) {
            if(confirm('确定删除这张卡片吗？')) { await deleteTaskDB(id); renderBoard(); }
        }
        function downloadVideo(url) {
            const a = document.createElement('a'); a.href = url; a.target = "_blank"; a.download = `Studio_${Date.now()}.mp4`; a.click();
        }
    </script>
</body>
</html>
