<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veo Studio - Pro Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <style>
        :root {
            --bg: #0f0f11;
            --surface: #1c1c1e;
            --surface-hover: #2c2c2e;
            --border: #333336;
            --text-main: #f5f5f5;
            --text-sub: #8e8e93;
            --accent: #0a84ff;
            --success: #32d74b;
            --danger: #ff453a;
            --radius-lg: 20px;
            --radius-md: 12px;
            --radius-sm: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Google Sans', -apple-system, sans-serif; }
        
        body {
            background-color: var(--bg);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color-scheme: dark;
        }

        .top-bar {
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            background: linear-gradient(180deg, rgba(15,15,17,1) 0%, rgba(15,15,17,0) 100%);
            z-index: 10;
        }
        .logo { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: 600; }

        .gallery-container {
            flex: 1;
            padding: 0 32px 180px 32px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            align-content: start;
        }
        .gallery-container::-webkit-scrollbar { width: 6px; }
        .gallery-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .video-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: transform 0.2s;
        }
        .video-card:hover { border-color: #4a4a4d; }

        .card-header { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-sub); }
        .card-header .time-model { display: flex; align-items: center; gap: 6px; }
        
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: #2c2c2e; color: var(--text-main); }
        .status-badge.success { background: rgba(50, 215, 75, 0.15); color: var(--success); }
        .status-badge.failed { background: rgba(255, 69, 58, 0.15); color: var(--danger); }
        .status-badge.processing { background: rgba(10, 132, 255, 0.15); color: var(--accent); }

        .card-prompt { display: flex; gap: 8px; align-items: flex-start; }
        .card-prompt img { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; background: #2c2c2e; flex-shrink: 0; }
        .card-prompt p { font-size: 13px; line-height: 1.4; color: var(--text-main); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .card-tags { display: flex; gap: 6px; }
        .card-tag { background: #2c2c2e; padding: 2px 6px; border-radius: 4px; font-size: 11px; color: var(--text-sub); }

        .card-media { width: 100%; aspect-ratio: 9/16; background: #000; border-radius: var(--radius-sm); overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center;}
        .card-media.landscape { aspect-ratio: 16/9; }
        .card-media.square { aspect-ratio: 1/1; }
        .card-media video { width: 100%; height: 100%; object-fit: contain; }
        
        .loading-ring { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--text-main); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .card-actions { display: flex; justify-content: flex-end; gap: 8px; padding-top: 4px; border-top: 1px solid var(--border); }
        .card-actions button { background: transparent; border: none; color: var(--text-sub); cursor: pointer; display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 4px; transition: all 0.2s; }
        .card-actions button:hover { background: var(--surface-hover); color: var(--text-main); }

        /* ==========================================
           ✨ 核心沉浸式悬浮控制台 
           ========================================== */
        .floating-console {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 860px;
            background: rgba(28, 28, 30, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-lg);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .prompt-container {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .mode-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 100px;
            padding: 4px;
            width: fit-content;
        }
        .mode-tab {
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 13px;
            color: var(--text-sub);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .mode-tab.active {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
        }
        .mode-tab .material-symbols-outlined { font-size: 16px; }

        .input-wrapper {
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .slot-group { display: none; gap: 8px; align-items: center; flex-shrink: 0; position: relative; }
        .slot-group.active { display: flex; }
        
        .img-slot {
            width: 56px; 
            height: 72px;
            border: 1px dashed #666;
            border-radius: 8px;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            cursor: pointer; 
            position: relative; 
            background: rgba(255,255,255,0.02);
            transition: all 0.2s;
        }
        .img-slot:hover { border-color: var(--text-main); background: rgba(255,255,255,0.05); }
        .img-slot span { font-size: 11px; color: var(--text-sub); margin-top: 4px; }
        .img-slot .material-symbols-outlined { font-size: 18px; color: var(--text-sub); }
        
        .img-slot.has-img { border: none; background: transparent; }
        .img-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; z-index: 1; display: none; border-radius: 8px;}
        .img-slot.has-img img { display: block; border: 1px solid var(--border); }
        
        .count-badge { 
            position: absolute; bottom: -6px; right: -6px; 
            background: white; color: black; border-radius: 50%; 
            width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; 
            font-size: 11px; font-weight: bold; z-index: 10; box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            display: none; 
        }

        .remove-badge { 
            position: absolute; top: -6px; right: -6px; 
            background: rgba(0,0,0,0.8); border: 1px solid #444; border-radius: 50%; 
            width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; 
            font-size: 12px; z-index: 10; cursor: pointer; color: white; display: none; 
        }
        .img-slot.has-img .remove-badge { display: flex; }

        .hidden-input { display: none; }

        /* ==========================================
           🌌 全新图库管理弹窗 (Popover)
           ========================================== */
        .ref-popover {
            position: absolute;
            bottom: calc(100% + 12px);
            left: 0;
            background: rgba(30, 30, 32, 0.95);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 12px;
            display: flex;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            z-index: 200;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transform-origin: bottom left;
            animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.9) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        
        .ref-list { display: flex; gap: 8px; }
        .popover-img-item {
            width: 72px; height: 96px;
            border-radius: 8px; position: relative; overflow: hidden; border: 1px solid var(--border);
        }
        .popover-img-item img { width: 100%; height: 100%; object-fit: cover; }
        .popover-rm-btn {
            position: absolute; top: 4px; right: 4px;
            background: rgba(0,0,0,0.7); color: white; border-radius: 50%;
            width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
            font-size: 14px; cursor: pointer; z-index: 10; transition: background 0.2s; backdrop-filter: blur(4px);
        }
        .popover-rm-btn:hover { background: rgba(255,69,58,0.9); }
        
        .ref-add-btn {
            width: 72px; height: 96px;
            border-radius: 8px; border: 1px dashed var(--text-sub);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-sub); transition: all 0.2s; background: rgba(255,255,255,0.02);
        }
        .ref-add-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-main); }

        .prompt-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 14px;
            resize: none;
            height: 72px;
            line-height: 1.5;
        }
        .prompt-input:focus { outline: none; }
        .prompt-input::placeholder { color: #666; }

        /* 底部操作栏 */
        .console-actions-row { display: flex; justify-content: space-between; align-items: center; padding-top: 4px;}
        
        .pill-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .action-pill {
            position: relative;
            background: rgba(255,255,255,0.08);
            border: 1px solid transparent;
            padding: 6px 12px;
            border-radius: 100px;
            font-size: 12px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-pill:hover { background: rgba(255,255,255,0.15); }
        .action-pill select { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        
        /* 针对 Seed 输入框的特殊去除默认上下箭头样式 */
        .seed-input-field::-webkit-outer-spin-button,
        .seed-input-field::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .seed-input-field[type=number] { -moz-appearance: textfield; }

        .submit-btn {
            background: var(--text-main);
            color: var(--bg);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .submit-btn:hover:not(:disabled) { transform: scale(1.05); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>

<body>

    <div class="top-bar">
        <div class="logo">
            <span class="material-symbols-outlined">movie_edit</span> Veo Studio Pro
        </div>
    </div>

    <div class="gallery-container" id="task-dashboard"></div>

    <div class="floating-console">
        
        <div class="prompt-container">
            <div class="mode-tabs">
                <div class="mode-tab active" onclick="switchMode('ref')" id="tab-ref">
                    <span class="material-symbols-outlined">image</span> 参考图
                </div>
                <div class="mode-tab" onclick="switchMode('frame')" id="tab-frame">
                    <span class="material-symbols-outlined">movie</span> 首尾帧
                </div>
            </div>

            <div class="input-wrapper">
                
                <div class="slot-group active" id="slots-ref">
                    <div class="img-slot" id="slot-ref-box" onclick="toggleRefPopover(event)">
                        <span class="material-symbols-outlined" id="ref-icon-placeholder">add_photo_alternate</span>
                        <span id="ref-text-placeholder">参考图</span>
                        <img id="ref-img">
                        <div class="count-badge" id="ref-count-badge">3</div>
                    </div>
                    
                    <input type="file" id="ref-file" class="hidden-input" accept="image/*" multiple onchange="handleMultiRefs(this)">
                    
                    <div class="ref-popover" id="ref-popover" style="display: none;" onclick="event.stopPropagation()">
                        <div class="ref-list" id="ref-list-container">
                            </div>
                        <div class="ref-add-btn" onclick="document.getElementById('ref-file').click()" id="ref-popover-add">
                            <span class="material-symbols-outlined">add</span>
                        </div>
                    </div>
                </div>

                <div class="slot-group" id="slots-frame">
                    <div class="img-slot" id="slot-first-box" onclick="document.getElementById('first-file').click()">
                        <span class="material-symbols-outlined">add</span>
                        <span>首帧</span>
                        <img id="first-img">
                        <div class="remove-badge" onclick="clearFrame(event, 'firstFrame')">×</div>
                        <input type="file" id="first-file" class="hidden-input" accept="image/*" onchange="handleSingleFrame(this, 'firstFrame')">
                    </div>
                    
                    <span class="material-symbols-outlined" style="color: #666; font-size: 16px;">swap_horiz</span>
                    
                    <div class="img-slot" id="slot-last-box" onclick="document.getElementById('last-file').click()">
                        <span class="material-symbols-outlined">add</span>
                        <span>尾帧</span>
                        <img id="last-img">
                        <div class="remove-badge" onclick="clearFrame(event, 'lastFrame')">×</div>
                        <input type="file" id="last-file" class="hidden-input" accept="image/*" onchange="handleSingleFrame(this, 'lastFrame')">
                    </div>
                </div>

                <textarea id="prompt-input" class="prompt-input" placeholder="描述视频画面内容和动态过程，使用 @ 指定参考图或参考视频..."></textarea>
            </div>
        </div>

        <div class="console-actions-row">
            <div class="pill-group">
                <div class="action-pill">
                    <span class="material-symbols-outlined" id="ratio-icon">crop_portrait</span>
                    <span id="ratio-text">9:16</span>
                    <select id="ratio-select" onchange="updateRatio(this)">
                        <option value="9:16">竖屏 9:16</option>
                        <option value="16:9">横屏 16:9</option>
                        <option value="1:1">方形 1:1</option>
                    </select>
                </div>

                <div class="action-pill">
                    <span class="material-symbols-outlined">model_training</span>
                    <span id="model-text">Veo 3.1 Fast</span>
                    <select id="model-select" onchange="updateModel(this)">
                        <option value="veo_3_1_fast">Veo 3.1 Fast</option>
                        <option value="veo_3_1_hq">Veo 3.1 Fast 4K</option>
                    </select>
                </div>

                <div class="action-pill">
                    <span class="material-symbols-outlined">videocam</span>
                    <span id="camera-text">智能运镜</span>
                    <select id="camera-select" onchange="updateCamera(this)">
                        <option value="none">智能运镜</option>
                        <option value="pan_left">向左平移</option>
                        <option value="pan_right">向右平移</option>
                        <option value="zoom_in">推进</option>
                    </select>
                </div>

                <div class="action-pill" style="cursor: text; padding-right: 6px;">
                    <span class="material-symbols-outlined" style="font-size: 16px;">tag</span>
                    <input type="number" id="seed-input" class="seed-input-field" placeholder="随机种子 (0 为随机)" style="background:transparent; border:none; color:var(--text-main); width: 110px; font-size: 12px; outline:none;">
                </div>
            </div>

            <button class="submit-btn" id="generate-btn" onclick="submitTask()">
                <span class="material-symbols-outlined">arrow_upward</span>
            </button>
        </div>
    </div>

    <script>
        // ==========================================
        // ⚙️ API 与状态管理
        // ==========================================
        
        // ✨ 已自动替换为你最新的 Cloudflare 穿透地址 (端口 5679)
        const API_SUBMIT = 'https://jack-neil-lewis-sharing.trycloudflare.com/webhook/proxy-submit'; 
        const API_POLL = 'https://jack-neil-lewis-sharing.trycloudflare.com/webhook/proxy-poll';     

        let payloadState = {
            aspectRatio: '9:16', 
            model: 'veo_3_1_fast',
            duration: '8s', 
            cameraMotion: 'none',
            firstFrame: null,
            lastFrame: null,
            references: [],
            currentMode: 'ref' 
        };

        document.addEventListener('DOMContentLoaded', () => {
            renderDashboard();
            resumeActivePolls();
        });

        // 监听点击外部关闭弹窗
        document.addEventListener('click', (e) => {
            const popover = document.getElementById('ref-popover');
            const slotBox = document.getElementById('slot-ref-box');
            if (popover && popover.style.display === 'flex' && !popover.contains(e.target) && !slotBox.contains(e.target)) {
                popover.style.display = 'none';
            }
        });

        // ==========================================
        // 🎛️ UI 交互逻辑
        // ==========================================
        function switchMode(mode) {
            payloadState.currentMode = mode;
            document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.slot-group').forEach(s => s.classList.remove('active'));
            document.getElementById(`tab-${mode}`).classList.add('active');
            document.getElementById(`slots-${mode}`).classList.add('active');
        }

        function updateRatio(select) {
            payloadState.aspectRatio = select.value;
            document.getElementById('ratio-text').innerText = select.options[select.selectedIndex].text.split(' ')[1];
            const iconMap = {'16:9': 'crop_16_9', '9:16': 'crop_portrait', '1:1': 'crop_square'};
            document.getElementById('ratio-icon').innerText = iconMap[select.value];
        }

        function updateModel(select) {
            payloadState.model = select.value;
            document.getElementById('model-text').innerText = select.options[select.selectedIndex].text;
        }

        function updateCamera(select) {
            payloadState.cameraMotion = select.value;
            document.getElementById('camera-text').innerText = select.options[select.selectedIndex].text;
        }

        // ==========================================
        // 🖼️ 图像处理 (压缩与多图弹窗)
        // ==========================================
        async function compressImage(file, maxWidth = 1024) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ratio = Math.min(maxWidth / img.width, 1);
                        canvas.width = img.width * ratio;
                        canvas.height = img.height * ratio;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.85));
                    };
                };
            });
        }

        function toggleRefPopover(e) {
            e.stopPropagation();
            if (payloadState.references.length === 0) {
                document.getElementById('ref-file').click();
            } else {
                const popover = document.getElementById('ref-popover');
                popover.style.display = popover.style.display === 'flex' ? 'none' : 'flex';
            }
        }

        async function handleMultiRefs(input) {
            if (!input.files || input.files.length === 0) return;
            const files = Array.from(input.files);
            
            if (payloadState.references.length + files.length > 3) return alert('最多支持 3 张参考图');
            
            for (let file of files) {
                payloadState.references.push(await compressImage(file));
            }
            
            input.value = '';
            renderReferences();
            
            if(payloadState.references.length > 0) {
                document.getElementById('ref-popover').style.display = 'flex';
            }
        }

        function removeReference(event, index) {
            event.stopPropagation();
            payloadState.references.splice(index, 1);
            renderReferences();
            if(payloadState.references.length === 0) {
                document.getElementById('ref-popover').style.display = 'none';
            }
        }

        function renderReferences() {
            const box = document.getElementById('slot-ref-box');
            const imgEl = document.getElementById('ref-img');
            const countBadge = document.getElementById('ref-count-badge');
            const placeholderIcon = document.getElementById('ref-icon-placeholder');
            const placeholderText = document.getElementById('ref-text-placeholder');
            
            const listContainer = document.getElementById('ref-list-container');
            const addBtn = document.getElementById('ref-popover-add');
            
            if (payloadState.references.length === 0) {
                box.classList.remove('has-img');
                imgEl.src = '';
                countBadge.style.display = 'none';
                placeholderIcon.style.display = 'block';
                placeholderText.style.display = 'block';
            } else {
                box.classList.add('has-img');
                imgEl.src = payloadState.references[0];
                placeholderIcon.style.display = 'none';
                placeholderText.style.display = 'none';
                
                if (payloadState.references.length > 1) {
                    countBadge.style.display = 'flex';
                    countBadge.innerText = payloadState.references.length;
                } else {
                    countBadge.style.display = 'none';
                }
            }
            
            listContainer.innerHTML = '';
            payloadState.references.forEach((b64, index) => {
                const item = document.createElement('div');
                item.className = 'popover-img-item';
                item.innerHTML = `
                    <img src="${b64}">
                    <div class="popover-rm-btn" onclick="removeReference(event, ${index})">×</div>
                `;
                listContainer.appendChild(item);
            });
            
            addBtn.style.display = payloadState.references.length >= 3 ? 'none' : 'flex';
        }

        async function handleSingleFrame(input, type) {
            if (!input.files[0]) return;
            payloadState[type] = await compressImage(input.files[0]);
            
            const typeStr = type === 'firstFrame' ? 'first' : 'last';
            document.getElementById(`${typeStr}-img`).src = payloadState[type];
            document.getElementById(`slot-${typeStr}-box`).classList.add('has-img');
            input.value = '';
        }

        function clearFrame(event, type) {
            event.preventDefault(); event.stopPropagation();
            payloadState[type] = null;
            const typeStr = type === 'firstFrame' ? 'first' : 'last';
            document.getElementById(`slot-${typeStr}-box`).classList.remove('has-img');
            document.getElementById(`${typeStr}-img`).src = '';
        }

        // ==========================================
        // 🚀 核心任务调度与瀑布流渲染
        // ==========================================
        async function submitTask() {
            const prompt = document.getElementById('prompt-input').value.trim();
            const seedInput = document.getElementById('seed-input').value.trim();
            const btn = document.getElementById('generate-btn');

            if (!prompt) return alert('请填写提示词');

            btn.disabled = true;
            btn.innerHTML = `<div class="loading-ring" style="width:16px;height:16px;border-width:2px;"></div>`;

            let submitRef = [];
            let submitFirst = null;
            let submitLast = null;

            if (payloadState.currentMode === 'ref') {
                submitRef = payloadState.references;
            } else {
                submitFirst = payloadState.firstFrame;
                submitLast = payloadState.lastFrame;
            }

            // 处理 Seed 逻辑 (如果为空或者 0，则传 null 让大模型自己随机)
            const seedValue = (seedInput && seedInput !== '0') ? parseInt(seedInput, 10) : null;

            const payload = {
                prompt: prompt,
                model: payloadState.model,
                aspectRatio: payloadState.aspectRatio,
                duration: '8s', 
                cameraMotion: payloadState.cameraMotion,
                seed: seedValue,     
                firstFrame: submitFirst,
                lastFrame: submitLast,
                references: submitRef
            };

            try {
                const response = await fetch(API_SUBMIT, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
                const data = await response.json();

                if (data.taskId) {
                    saveTaskLocal(data.taskId, payload, 'processing');
                    startTaskPolling(data.taskId);
                    document.getElementById('prompt-input').value = ''; 
                    document.getElementById('ref-popover').style.display = 'none';
                } else throw new Error("API未返回TaskID");
            } catch (error) {
                alert('提交失败: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<span class="material-symbols-outlined">arrow_upward</span>`;
            }
        }

        function startTaskPolling(taskId) {
            let attempts = 0;
            const poll = async () => {
                attempts++;
                try {
                    const response = await fetch(`${API_POLL}?taskId=${taskId}`);
                    const data = await response.json();
                    if (data.status === 'success' && data.videoUrl) return updateTaskLocal(taskId, 'success', data.videoUrl);
                    if (data.status === 'failed') return updateTaskLocal(taskId, 'failed', null);
                    if (attempts < 60) setTimeout(poll, 15000); else updateTaskLocal(taskId, 'failed', null);
                } catch (error) { setTimeout(poll, 15000); }
            };
            poll();
        }

        function getTasks() { return JSON.parse(localStorage.getItem('veo_gallery_tasks') || '[]'); }

        function saveTaskLocal(taskId, payload, status) {
            const tasks = getTasks();
            tasks.unshift({
                id: taskId,
                prompt: payload.prompt,
                modelStr: payload.model === 'veo_3_1_fast' ? 'Veo 3 Fast' : 'Veo 3 HQ',
                ratio: payload.aspectRatio,
                duration: payload.duration,
                thumb: payload.firstFrame || (payload.references && payload.references[0]) || '', 
                status: status,
                time: '刚刚',
                videoUrl: null
            });
            localStorage.setItem('veo_gallery_tasks', JSON.stringify(tasks.slice(0, 50)));
            renderDashboard();
        }

        function updateTaskLocal(taskId, status, url) {
            const tasks = getTasks();
            const task = tasks.find(t => t.id === taskId);
            if (task) {
                task.status = status;
                task.videoUrl = url;
                localStorage.setItem('veo_gallery_tasks', JSON.stringify(tasks));
                renderDashboard();
            }
        }

        function renderDashboard() {
            const tasks = getTasks();
            const container = document.getElementById('task-dashboard');
            if (tasks.length === 0) return container.innerHTML = '<div style="grid-column: 1/-1; text-align:center; color:var(--text-sub); margin-top: 100px;">暂无生成任务，在底部输入提示词开始创作。</div>';

            container.innerHTML = tasks.map((task, index) => {
                let statusBadge = '';
                let mediaHtml = '';
                let ratioClass = task.ratio === '16:9' ? 'landscape' : (task.ratio === '1:1' ? 'square' : '');

                if (task.status === 'processing') {
                    statusBadge = `<span class="status-badge processing">生成中...</span>`;
                    mediaHtml = `<div class="card-media ${ratioClass}"><div class="loading-ring"></div></div>`;
                } else if (task.status === 'failed') {
                    statusBadge = `<span class="status-badge failed">失败</span>`;
                    mediaHtml = `<div class="card-media ${ratioClass}" style="background:#2c2c2e; color:var(--danger); font-size:12px;">生成超时或失败</div>`;
                } else {
                    statusBadge = `<span class="status-badge success">已完成</span>`;
                    mediaHtml = `<div class="card-media ${ratioClass}">
                                    <video src="${task.videoUrl}" controls controlslist="nodownload"></video>
                                 </div>`;
                }

                const thumbHtml = task.thumb ? `<img src="${task.thumb}">` : `<div style="width:40px;height:40px;border-radius:4px;background:#2c2c2e;display:flex;align-items:center;justify-content:center;"><span class="material-symbols-outlined" style="font-size:18px;color:#666;">image</span></div>`;

                return `
                <div class="video-card">
                    <div class="card-header">
                        <div class="time-model">
                            <span class="material-symbols-outlined" style="font-size: 14px;">schedule</span> ${task.time} · ${task.modelStr}
                        </div>
                        ${statusBadge}
                    </div>
                    <div class="card-prompt">
                        ${thumbHtml}
                        <p title="${task.prompt}">${task.prompt}</p>
                    </div>
                    <div class="card-tags">
                        <span class="card-tag">${task.ratio}</span>
                        <span class="card-tag">${task.duration}</span>
                    </div>
                    ${mediaHtml}
                    <div class="card-actions">
                        ${task.status === 'success' ? `<button onclick="downloadVideo('${task.videoUrl}')" title="下载视频"><span class="material-symbols-outlined">download</span></button>` : ''}
                        <button onclick="deleteTask(${index})" title="删除记录"><span class="material-symbols-outlined">delete</span></button>
                    </div>
                </div>
                `;
            }).join('');
        }

        function resumeActivePolls() {
            const tasks = getTasks();
            tasks.forEach(task => { if (task.status === 'processing') startTaskPolling(task.id); });
        }

        function deleteTask(index) {
            if(confirm('确定删除这条生成记录吗？')) {
                const tasks = getTasks();
                tasks.splice(index, 1);
                localStorage.setItem('veo_gallery_tasks', JSON.stringify(tasks));
                renderDashboard();
            }
        }

        function downloadVideo(url) {
            const a = document.createElement('a');
            a.href = url;
            a.target = "_blank";
            a.download = `Veo_Video_${Date.now()}.mp4`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>

</html>
